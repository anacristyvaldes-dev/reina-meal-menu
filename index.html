<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reina — Menú Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="pb-16 md:pb-0">

  <!-- ── Header (always visible) ── -->
  <header class="header-grain relative bg-yellow-green text-center py-11 px-8 overflow-hidden">
    <h1 class="font-display text-[89px] font-normal text-terracotta uppercase tracking-widest leading-none relative z-2">Reina</h1>
    <p class="font-body text-xs font-semibold tracking-[0.34em] uppercase text-green-dark mt-2.5 relative z-2">¿Qué hay de comer?</p>
  </header>

  <!-- ── Desktop nav bar (rendered by router.js, mobile version is fixed at bottom) ── -->
  <nav id="tab-bar"></nav>

  <!-- ── Page: Catálogo ── -->
  <section data-page="catalogo">
    <main>
      <div id="filter-bar" class="flex flex-wrap items-center gap-1.5 pt-7 px-6 sm:px-10 max-w-[1440px] mx-auto"></div>
      <div id="card-grid" class="grid grid-cols-1 sm:grid-cols-[repeat(auto-fill,minmax(240px,1fr))] gap-8 px-6 sm:px-10 py-12 max-w-[1440px] mx-auto">
        Cargando...
      </div>
      <div id="error-message" hidden class="text-center py-16 px-6 text-terracotta text-sm">
        No se pudo cargar el menú. Intenta de nuevo.
      </div>
    </main>
    <footer class="flex flex-col items-center py-16 px-6">
      <img src="/images/reina-stamp.png" alt="Reina" class="w-[200px] block mix-blend-multiply" />
    </footer>
  </section>

  <!-- ── Page: Lista del Súper ── -->
  <section data-page="lista" hidden>
    <section id="grocery-section" class="bg-section-bg"></section>
  </section>

  <!-- ── Page: Shared Shopper List (via link) ── -->
  <section data-page="super" hidden class="bg-section-bg"></section>

  <!-- ── Page: Planner (Phase 2) ── -->
  <section data-page="planner" hidden>
    <div class="max-w-[1440px] mx-auto px-6 sm:px-10 py-20 text-center">
      <h2 class="font-display text-4xl text-terracotta tracking-wide leading-none">Menú Semanal</h2>
      <p class="font-body text-sm text-text-secondary mt-4">Próximamente</p>
    </div>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
