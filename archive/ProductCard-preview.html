<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductCard Preview</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0ede8; display: flex; justify-content: center; padding: 32px 16px; min-height: 100vh; }

    /* ── ProductCard ─────────────────────────────────────────── */
    .pc-card {
      width: 375px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── Image ───────────────────────────────────────────────── */
    .pc-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f5f0eb;
    }
    .pc-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Etsy's Pick badge */
    .pc-etsy-pick-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(34, 34, 34, 0.75);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }
    .pc-etsy-pick-badge svg { flex-shrink: 0; }

    /* Dot pagination */
    .pc-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
    }
    .pc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
    }
    .pc-dot--active { background: #fff; }

    /* ── Info block ──────────────────────────────────────────── */
    .pc-info {
      padding: 14px 12px 20px;
      display: flex;
      flex-direction: column;
    }

    /* Price */
    .pc-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .pc-price { font-size: 24px; font-weight: 700; color: #222; letter-spacing: -0.3px; }
    .pc-tax-note { font-size: 13px; color: #595959; margin: 0 0 10px; line-height: 1.4; }

    /* Title */
    .pc-title {
      font-size: 14px;
      font-weight: 700;
      color: #222;
      margin: 0 0 4px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Seller row */
    .pc-seller-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
    .pc-seller { font-size: 14px; color: #222; line-height: 1.4; }

    /* Star rating */
    .pc-rating-row { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
    .pc-stars { display: flex; align-items: center; gap: 1px; }
    .pc-review-count {
      font-size: 13px;
      color: #595959;
      text-decoration: underline;
      cursor: pointer;
      white-space: nowrap;
    }
    .pc-review-count:hover { color: #222; }

    /* ── CTA Buttons ─────────────────────────────────────────── */
    .pc-actions { display: flex; flex-direction: column; gap: 8px; }
    .pc-btn {
      width: 100%;
      height: 46px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s ease;
      letter-spacing: 0.1px;
    }
    .pc-btn:active { opacity: 0.85; }
    .pc-btn--primary { background: #222; color: #fff; }
    .pc-btn--primary:hover { background: #111; }
    .pc-btn--secondary { background: #fff; color: #222; border: 2px solid #d4d4d4; }
    .pc-btn--secondary:hover { border-color: #aaa; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function StarIcon({ half = false, empty = false }) {
      if (empty) {
        return (
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 1.5L11.09 6.26L16.18 6.77L12.55 10.14L13.64 15.18L9 12.45L4.36 15.18L5.45 10.14L1.82 6.77L6.91 6.26L9 1.5Z" fill="#D4D4D4"/>
          </svg>
        );
      }
      if (half) {
        return (
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <defs>
              <linearGradient id="halfGrad">
                <stop offset="50%" stopColor="#E8A400"/>
                <stop offset="50%" stopColor="#D4D4D4"/>
              </linearGradient>
            </defs>
            <path d="M9 1.5L11.09 6.26L16.18 6.77L12.55 10.14L13.64 15.18L9 12.45L4.36 15.18L5.45 10.14L1.82 6.77L6.91 6.26L9 1.5Z" fill="url(#halfGrad)"/>
          </svg>
        );
      }
      return (
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 1.5L11.09 6.26L16.18 6.77L12.55 10.14L13.64 15.18L9 12.45L4.36 15.18L5.45 10.14L1.82 6.77L6.91 6.26L9 1.5Z" fill="#E8A400"/>
        </svg>
      );
    }

    function StarSellerBadge() {
      return (
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="9" fill="#595959"/>
          <path d="M9 4L10.18 7.27L13.66 7.27L10.94 9.27L11.96 12.54L9 10.74L6.04 12.54L7.06 9.27L4.34 7.27L7.82 7.27L9 4Z" fill="white"/>
        </svg>
      );
    }

    function EtsysPickBadge() {
      return (
        <div className="pc-etsy-pick-badge">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1L8.545 4.91L12.728 4.91L9.546 7.27L10.727 11.18L7 8.91L3.273 11.18L4.454 7.27L1.272 4.91L5.455 4.91L7 1Z" fill="white"/>
          </svg>
          <span>Etsy's Pick</span>
        </div>
      );
    }

    function ProductCard({
      image = "https://images.unsplash.com/photo-1513506003901-1e6a35f3d1c5?w=750&q=80",
      price = "$94.00",
      taxNote = "Local taxes included (where applicable)",
      title = "Table lamp TORO x AMBER, retro minimal 3D printed...",
      seller = "3DecoStudio",
      starCount = 4.5,
      reviewCount = 257,
      onAddToCart = () => alert("Added to cart!"),
      onViewOptions = () => alert("View item options"),
    }) {
      const fullStars = Math.floor(starCount);
      const hasHalf = starCount % 1 >= 0.5;
      const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);

      return (
        <div className="pc-card">
          {/* Product image */}
          <div className="pc-image-wrap">
            <img src={image} alt={title} className="pc-image" />
            <EtsysPickBadge />
            <div className="pc-dots">
              {[0,1,2,3,4].map(i => (
                <span key={i} className={`pc-dot${i === 0 ? " pc-dot--active" : ""}`} />
              ))}
            </div>
          </div>

          {/* Product info */}
          <div className="pc-info">
            <div className="pc-price-row">
              <span className="pc-price">{price}</span>
            </div>
            <p className="pc-tax-note">{taxNote}</p>

            <h1 className="pc-title">{title}</h1>

            <div className="pc-seller-row">
              <span className="pc-seller">Designed by {seller}</span>
              <StarSellerBadge />
            </div>

            <div className="pc-rating-row">
              <div className="pc-stars">
                {Array.from({ length: fullStars }).map((_, i) => <StarIcon key={`f${i}`} />)}
                {hasHalf && <StarIcon half />}
                {Array.from({ length: emptyStars }).map((_, i) => <StarIcon key={`e${i}`} empty />)}
              </div>
              <a href="#reviews" className="pc-review-count">
                {reviewCount.toLocaleString()} reviews
              </a>
            </div>

            <div className="pc-actions">
              <button className="pc-btn pc-btn--primary" onClick={onAddToCart}>
                Add to cart
              </button>
              <button className="pc-btn pc-btn--secondary" onClick={onViewOptions}>
                View item options
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ProductCard />);
  </script>
</body>
</html>
